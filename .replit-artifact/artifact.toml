kind = "web"
previewPath = "/"
title = "Mayank & Anu - Save the Date"
version = "1.0.0"
id = "artifacts/save-the-date"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19826
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/save-the-date run dev"

[services.env]
PORT = "19826"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/save-the-date", "run", "build"]
publicDir = "artifacts/save-the-date/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
